function resetScanView(){document.getElementById('checkinHome').style.display='';document.getElementById('checkinRoom').style.display='none';document.getElementById('scanStatus').style.display='none';detectedRoomId=null;if(window.history.replaceState){const u=new URL(window.location);u.searchParams.delete('room');window.history.replaceState({},'',u)}}
function checkURLForRoom(){const p=new URLSearchParams(window.location.search);const r=p.get('room');if(r){const l=ALL_LOCS.find(x=>x.id===r);if(l){if(navigator.vibrate)navigator.vibrate([50,30,50]);switchView('checkin');roomDetected(r);return true}}return false}
function scanSubText(rid){const c=patients.filter(p=>p.currentLocation===rid).length;const l=ALL_LOCS.find(x=>x.id===rid);const maxP=l&&l.maxPatients?l.maxPatients:0;let sub=c>0?c+' Patient(en) hier':'Raum frei';if(maxP){sub+=` · Max. ${maxP}`;if(c>=maxP)sub+=maxP===1?' · ⛔ Belegt':' · ⚠ Voll'}return sub}
function roomDetected(rid){detectedRoomId=rid;const l=ALL_LOCS.find(x=>x.id===rid);if(!l){toast('Unbekannter Raum');return}document.getElementById('checkinHome').style.display='none';document.getElementById('checkinRoom').style.display='';document.getElementById('detectedIcon').innerHTML=roomIco(rid,'ico-hero');document.getElementById('detectedName').textContent=l.name;document.getElementById('detectedSub').textContent=scanSubText(rid);renderScanPatients();tryAutoAssign(rid)}
function patSuiteId(p){if(!p.suite)return null;const n=p.suite.replace(/\D/g,'');return n?'suite-'+n:null}
function getPatientTrackRooms(p){
  if(p.track){const t=tracks.find(x=>x.id===p.track);if(t&&t.rooms.length){return t.rooms.map(rid=>ALL_LOCS.find(x=>x.id===rid)).filter(Boolean)}}
  return STATIONS;
}
function nextPendingRoom(p){
  const trackRooms=getPatientTrackRooms(p);
  const curIdx=trackRooms.findIndex(s=>s.id===p.currentLocation);
  if(curIdx>=0){if(curIdx>=trackRooms.length-1)return null;return trackRooms[curIdx+1]}
  const inSuite=SUITE_ROOMS.some(s=>s.id===p.currentLocation);
  if(inSuite)return trackRooms[0]||null;
  const isPause=PAUSES.some(s=>s.id===p.currentLocation);
  if(isPause&&p.journey&&p.journey.length){
    for(let i=p.journey.length-1;i>=0;i--){
      const idx=trackRooms.findIndex(s=>s.id===p.journey[i].loc);
      if(idx>=0){if(idx>=trackRooms.length-1)return null;return trackRooms[idx+1]}
    }
    return trackRooms[0]||null;
  }
  if(p.journey&&p.journey.length){for(let i=p.journey.length-1;i>=0;i--){const idx=trackRooms.findIndex(s=>s.id===p.journey[i].loc);if(idx>=0){if(idx>=trackRooms.length-1)return null;return trackRooms[idx+1]}const wasSuite=SUITE_ROOMS.some(s=>s.id===p.journey[i].loc);if(wasSuite)return trackRooms[0]||null}}
  return trackRooms[0]||null;
}
function scanScore(p){const s=pStatus(p);if(p.currentLocation===detectedRoomId)return-100;let score=0;const nxtRoom=nextPendingRoom(p);const isNextHere=nxtRoom&&nxtRoom.id===detectedRoomId;if(isNextHere)score+=200;if(s==='waiting')score+=50;else if(s==='pause')score+=40;else if(s==='in-room')score+=10;else if(s==='not-arrived')score+=5;const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();if(p.startzeit){const parts=p.startzeit.split(':');const planMin=+parts[0]*60+ +parts[1];const diff=Math.abs(nowMin-planMin);score+=Math.max(0,30-diff)}if(!isNextHere)score-=100;return score}
function renderScanPatients(){document.getElementById('detectedSub').textContent=scanSubText(detectedRoomId);const q=document.getElementById('scanSearchInput').value.toLowerCase();let list=patients.filter(p=>pStatus(p)!=='done');if(q)list=list.filter(p=>`${p.vorname} ${p.nachname} ${p.pid}`.toLowerCase().includes(q));list.sort((a,b)=>scanScore(b)-scanScore(a));const alreadyHere=list.filter(p=>p.currentLocation===detectedRoomId);const candidates=list.filter(p=>p.currentLocation!==detectedRoomId);const qaArea=document.getElementById('quickAssignArea');let qaH='';
// Occupant cards — wer ist gerade im Raum?
if(!q&&alreadyHere.length){const defaultPause=PAUSES.length?PAUSES[0].id:'wartebereich';qaH+=alreadyHere.map(p=>{const dur=p.locationSince?fmtDur(p.locationSince):'';const topCand=candidates.length?candidates[0]:null;return`<div class="scan-occupant"><div class="scan-occupant-hdr">Aktuell im Raum · ${dur}</div><div class="scan-occupant-info"><div class="psc-avatar">${ini(p.vorname,p.nachname)}</div><div><div class="scan-occupant-name">${p.vorname} ${p.nachname}</div><div class="scan-occupant-meta">#${p.pid}${p.mfa?' · '+p.mfa:''}</div></div></div><div class="scan-occupant-actions"><button class="scan-occ-btn done" onclick="scanMoveOccupant('${p.id}','abschluss')">✓ Fertig</button><button class="scan-occ-btn move" onclick="scanMoveOccupant('${p.id}','${defaultPause}')">→ ${locName(defaultPause)}</button><button class="scan-occ-btn move" onclick="scanPickRoom('${p.id}')">↗ Anderer Raum</button>${topCand?`<button class="scan-occ-btn primary" onclick="scanSwap('${p.id}','${topCand.id}')">⇄ Tauschen mit ${topCand.vorname}</button>`:''}</div></div>`}).join('')}
// Quick-Assign Hero
if(!q&&candidates.length>0){const top=candidates[0];const s=pStatus(top);const nxtRoom=nextPendingRoom(top);const isNextHere=nxtRoom&&nxtRoom.id===detectedRoomId;const nxtRoomName=nxtRoom?nxtRoom.name:'—';let locLine='';if(s==='not-arrived'){const sid=patSuiteId(top);const sn=sid?locName(sid):top.suite;locLine='📍 '+sn}else if(s==='waiting')locLine='📍 Wartebereich';else locLine='📍 '+locName(top.currentLocation);locLine+=isNextHere?' → Dieser Raum ist dran':' → Weiter: '+nxtRoomName;qaH+=`<div class="quick-assign" id="quickAssignCard"><div class="quick-assign-label">${ico('check','ico-sm')} Nächster Patient</div><div class="quick-assign-name">${top.vorname} ${top.nachname}</div><div class="quick-assign-meta">#${top.pid} · ${top.program} · ${top.startzeit}</div><div class="quick-assign-loc">${locLine}</div>${top.mfa?`<div class="quick-assign-mfa">MFA: ${top.mfa}</div>`:''}<button class="scan-checkin-btn" onclick="scanAssign('${top.id}')">Einchecken →</button></div>`}
qaArea.innerHTML=qaH;
const label=document.getElementById('scanListLabel');label.textContent=candidates.length>1?`Weitere Patienten (${candidates.length-1})`:'Alle Patienten';
document.getElementById('scanPatientList').innerHTML=candidates.slice(q?0:1).map(p=>{const s=pStatus(p);const nxtRoom=nextPendingRoom(p);const isNextHere=nxtRoom&&nxtRoom.id===detectedRoomId;const nxtRoomName=nxtRoom?nxtRoom.name:'—';let bc='b-new',bt='Nicht da';if(s==='not-arrived'){const sid=patSuiteId(p);bt=sid?locName(sid):p.suite||'Nicht da'}if(s==='in-room'){bc='b-room';bt=locName(p.currentLocation)}else if(s==='pause'){bc='b-pause';bt=locName(p.currentLocation)}else if(s==='waiting'){bc='b-wait';bt='Wartebereich'}const nxtStyle=isNextHere?'color:var(--mint);font-weight:700':'color:var(--warm-500)';const nxtLabel=isNextHere?'→ hierher':'→ '+nxtRoomName;return`<div class="pat-select-card"><div class="psc-info"><div class="psc-avatar">${ini(p.vorname,p.nachname)}</div><div><div class="psc-name">${p.vorname} ${p.nachname}</div><div class="psc-meta">#${p.pid} · ${fmtStartzeit(p.startzeit)}${p.mfa?' · '+p.mfa:''}</div></div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="badge ${bc}">${bt}</span><span style="font-size:11px;${nxtStyle};white-space:nowrap">${nxtLabel}</span><button class="scan-occ-btn primary" onclick="scanAssign('${p.id}')" style="white-space:nowrap">Einchecken</button></div></div>`}).join('')||(candidates.length<=1&&!alreadyHere.length?`<div class="empty"><div class="empty-icon">${ico('search','ico-xl')}</div><div class="empty-text">Kein Patient gefunden</div></div>`:'')}
async function tryAutoAssign(rid){const l=ALL_LOCS.find(x=>x.id===rid);if(!l)return;const isStation=STATIONS.some(s=>s.id===rid);if(!isStation)return;const inRoom=patients.filter(p=>p.currentLocation===rid).length;if(inRoom>0)return;const candidates=patients.filter(p=>{const s=pStatus(p);if(s!=='waiting'&&s!=='pause')return false;const nxt=nextPendingRoom(p);return nxt&&nxt.id===rid});if(candidates.length!==1)return;const p=candidates[0];const ok=await transitionPatient(p.id,rid,{log:true});if(ok){renderScanPatients();toast(`✓ ${p.vorname} ${p.nachname} automatisch zugewiesen`)}}
function showScanDone(pName,locName2,cb){const qa=document.getElementById('quickAssignArea');qa.innerHTML=`<div class="scan-done-card"><div class="scan-done-icon">✓</div><div class="scan-done-text">${pName} → ${locName2}</div><div class="scan-done-sub">Erfolgreich zugewiesen</div></div>`;document.getElementById('detectedSub').textContent=scanSubText(detectedRoomId);setTimeout(()=>{renderScanPatients();if(cb)cb()},1500)}
async function scanAssign(pid){if(!detectedRoomId)return;const cap=checkRoomCapacity(detectedRoomId);if(cap.full&&cap.hard){const occupants=patients.filter(p=>p.currentLocation===detectedRoomId);if(occupants.length){const occ=occupants[0];const defaultPause=PAUSES.length?PAUSES[0].id:'wartebereich';const r=await showModal('Raum belegt',`<p><strong>${occ.vorname} ${occ.nachname}</strong> ist noch in <strong>${cap.name}</strong>.</p><p>${patients.find(x=>x.id===pid)?.vorname||''} kann erst rein, wenn der Raum frei ist.</p>`,[{label:'Abbrechen',cls:'modal-btn-cancel',val:'no'},{label:`${occ.vorname} → ${locName(defaultPause)}`,cls:'modal-btn-confirm',val:'move'},{label:'⇄ Tauschen',cls:'modal-btn-confirm',val:'swap'}]);if(r==='move'){await transitionPatient(occ.id,defaultPause,{log:true});const mp=patients.find(x=>x.id===pid);await transitionPatient(pid,detectedRoomId,{log:true});showScanDone(mp?mp.vorname+' '+mp.nachname:'',locName(detectedRoomId))}else if(r==='swap'){await scanSwap(occ.id,pid)}else{return}return}}const p=patients.find(x=>x.id===pid);const pName=p?p.vorname+' '+p.nachname:'';const ok=await transitionPatient(pid,detectedRoomId,{log:true});if(ok){showScanDone(pName,locName(detectedRoomId))}}
async function scanMoveOccupant(pid,targetLoc){const p=patients.find(x=>x.id===pid);const pName=p?p.vorname+' '+p.nachname:'';const ok=await transitionPatient(pid,targetLoc,{log:true});if(ok){showScanDone(pName,locName(targetLoc))}}
async function scanSwap(oldPid,newPid){if(!detectedRoomId)return;const defaultPause=PAUSES.length?PAUSES[0].id:'wartebereich';const pOld=patients.find(x=>x.id===oldPid),pNew=patients.find(x=>x.id===newPid);const ok1=await transitionPatient(oldPid,defaultPause,{log:true});if(!ok1)return;const ok2=await transitionPatient(newPid,detectedRoomId,{log:true});if(ok2){showScanDone(`⇄ ${pOld?pOld.vorname:''} raus, ${pNew?pNew.vorname:''} rein`,locName(detectedRoomId))}}
function scanPickRoom(pid){const p=patients.find(x=>x.id===pid);if(!p)return;const targets=[...STATIONS.filter(s=>s.id!==detectedRoomId),...PAUSES];const g=document.getElementById('manualRoomGrid');g.innerHTML=targets.map(l=>{const c=patients.filter(x=>x.currentLocation===l.id).length;const maxP=l.maxPatients||0;const full=maxP&&c>=maxP;return`<button class="room-btn${full?' already-here':''}" onclick="closeManualRoom();scanMoveOccupant('${pid}','${l.id}')"><span class="ri">${roomIco(l.id)}</span><span class="rn">${l.name}</span><span class="rc">${c}${maxP?'/'+maxP:''} Pat.</span></button>`}).join('');document.getElementById('overlay2').classList.add('open');document.getElementById('sheet2').classList.add('open');document.body.classList.add('panel-open')}
function cancelScan(){resetScanView()}

function logActivity(t){activityLog.unshift({time:Date.now(),text:t});if(activityLog.length>8)activityLog.length=8;renderActivity()}

function renderFilters(){const f=[{id:'all',l:'Alle'},{id:'not-arrived',l:'Nicht da'},{id:'waiting',l:'Wartend'},{id:'in-room',l:'Behandlung'},{id:'pause',l:'Pause'},{id:'done',l:'Fertig'}];document.getElementById('filterRow').innerHTML=f.map(x=>`<button class="chip ${activeFilter===x.id?'on':''}" onclick="activeFilter='${x.id}';renderFilters();renderPatients()">${x.l}</button>`).join('')}
function renderPatients(){const q=(document.getElementById('patSearchInput').value||'').toLowerCase();let list=patients.filter(p=>{const s=`${p.vorname} ${p.nachname} ${p.pid} ${p.id} ${locName(p.currentLocation)} ${p.mfa} ${p.arzt} ${p.program} ${p.suite}`.toLowerCase();if(q&&!s.includes(q))return false;if(activeFilter==='all')return true;return pStatus(p)===activeFilter});list.sort((a,b)=>{const o={'in-room':0,pause:1,waiting:2,'not-arrived':3,done:4};if((o[pStatus(a)]||9)!==(o[pStatus(b)]||9))return(o[pStatus(a)]||9)-(o[pStatus(b)]||9);return a.startzeit.localeCompare(b.startzeit)});const el=document.getElementById('patientList');if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">${ico('search','ico-xl')}</div><div class="empty-text">Kein Patient gefunden</div></div>`;return}el.innerHTML=list.map(p=>{const s=pStatus(p);let bc,bt,ac;if(s==='in-room'){bc='b-room';bt=locName(p.currentLocation);ac='av-room'}else if(s==='pause'){bc='b-pause';bt=locName(p.currentLocation);ac='av-pause'}else if(s==='waiting'){bc='b-wait';bt='Wartend';ac='av-wait'}else if(s==='done'){bc='b-done';bt='Fertig';ac='av-done'}else{bc='b-new';bt='Nicht da';ac='av-new'}const el2=p.locationSince?(Date.now()-p.locationSince)/6e4:0;let tc=s==='pause'?'t-pause':'t-live';if(el2>50)tc='t-warn';return`<div class="pcard" onclick="openPatientSheet('${p.id}')"><div class="pcard-info"><div class="pcard-avatar ${ac}">${ini(p.vorname,p.nachname)}</div><div class="pcard-details"><div class="pcard-name">${p.vorname} ${p.nachname}</div><div class="pcard-meta"><span class="tag">#${p.pid}</span><span class="tag">${p.program}</span>${(()=>{const trk=tracks.find(t=>t.id===p.track);return trk?`<span class="tag" style="border-left:3px solid ${trk.color}">${trk.name}</span>`:''})()}<span class="tag">${p.suite}</span><span>${fmtStartzeit(p.startzeit)}</span>${p.locationSince?`<span class="${tc}">${fmtDur(p.locationSince)}</span>`:''}</div></div></div><span class="badge ${bc}">${bt}</span></div>`}).join('')}

function openPatientSheet(pid){const p=patients.find(x=>x.id===pid);if(!p)return;pendingEdits={};document.getElementById('sheetTitle').textContent=`${p.vorname} ${p.nachname}`;let h='';const s=pStatus(p);let sb='';if(s==='in-room')sb=`<span class="badge b-room">${locName(p.currentLocation)}</span>`;else if(s==='pause')sb=`<span class="badge b-pause">${locName(p.currentLocation)}</span>`;else if(s==='waiting')sb='<span class="badge b-wait">Wartend</span>';else if(s==='done')sb='<span class="badge b-done">Fertig</span>';else sb='<span class="badge b-new">Nicht da</span>';
h+=`<div style="padding:2px 20px 6px;display:flex;align-items:center;gap:8px"><span class="tag">#${p.id}</span>${sb}${p.locationSince?`<span style="font-size:12px;color:var(--text2)">${fmtDur(p.locationSince)}</span>`:''}</div>`;
if(s==='not-arrived')h+=`<div style="padding:4px 20px 8px"><button class="admin-btn primary" style="width:100%;padding:14px;font-size:15px" onclick="checkInPatient('${pid}')">${ico('checkCircle','ico-sm')} Patient ist angekommen — Einchecken</button></div>`;
h+=`<div class="sheet-tabs"><button class="sheet-tab ${sheetActiveTab==='raum'?'active':''}" onclick="switchSheetTab('raum','${pid}')">Raum</button><button class="sheet-tab ${sheetActiveTab==='behandlungen'?'active':''}" onclick="switchSheetTab('behandlungen','${pid}')">Behandlungen</button><button class="sheet-tab ${sheetActiveTab==='patient'?'active':''}" onclick="switchSheetTab('patient','${pid}')">Patient</button><button class="sheet-tab ${sheetActiveTab==='verweildauer'?'active':''}" onclick="switchSheetTab('verweildauer','${pid}')">Verweildauer</button><button class="sheet-tab ${sheetActiveTab==='verlauf'?'active':''}" onclick="switchSheetTab('verlauf','${pid}')">Verlauf</button></div>`;
// TAB: RAUM
const rbtn=(r,pid,cur,extra)=>{const lp=patients.filter(x=>x.currentLocation===r.id);const c=lp.length;const isAbschl=r.id==='abschluss';const isCur=cur===r.id;const tc=(isCur&&!isAbschl&&p.locationSince)?timeColor(r.id,p.locationSince):'';const colStyle=tc==='red'?'border-color:var(--red);background:var(--red-bg)':tc==='orange'?'border-color:var(--orange);background:var(--orange-bg)':'';const timeStr=(isCur&&!isAbschl&&p.locationSince)?fmtDur(p.locationSince):'';return`<button class="room-btn ${extra||''} ${isCur?'current':''}" style="${colStyle}" onclick="assignLoc('${pid}','${r.id}')"><span class="ri">${roomIco(r.id)}</span><span class="rn">${r.name}</span><span class="rc">${c} Pat.${timeStr?` · <span class="${tc?'t-'+tc:''}">${timeStr}</span>`:''}</span></button>`};
const pTrack=tracks.find(t=>t.id===p.track);
const trackRoomsList=pTrack?pTrack.rooms.filter(rid=>rid!=='abschluss').map(rid=>ALL_LOCS.find(x=>x.id===rid)).filter(Boolean):STATIONS;
h+=`<div class="sheet-tab-panel ${sheetActiveTab==='raum'?'active':''}">`;
// Track selector
h+=`<div style="padding:4px 20px 8px;display:flex;gap:6px;flex-wrap:wrap">`;
tracks.forEach(t=>{
  const isActive=p.track===t.id;
  h+=`<button style="padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid ${isActive?'var(--warm-900)':'var(--border)'};background:${isActive?'var(--warm-900)':'#fff'};color:${isActive?'var(--mint)':'var(--text)'};cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s" onclick="assignTrack('${pid}','${t.id}')"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.color}"></span>${t.name}</button>`;
});
h+=`</div>`;
// Track rooms
if(pTrack){h+=`<div class="room-grid">${trackRoomsList.map(r=>rbtn(r,pid,p.currentLocation)).join('')}</div>`}
else{h+=`<div style="padding:8px 20px;text-align:center;color:var(--orange);font-size:13px;font-weight:600">⚠ Bitte Track auswählen</div><div class="room-grid">${STATIONS.map(r=>rbtn(r,pid,p.currentLocation)).join('')}</div>`}
h+=`${s==='done'?`<div class="room-grid" style="grid-template-columns:1fr"><button class="room-btn" onclick="undoDone('${pid}')" style="flex-direction:row;gap:8px;justify-content:center;border-color:var(--orange);background:var(--orange-bg)"><span class="ri">${ico('arrowLeft')}</span><span class="rn">Zurückholen — wieder aktiv setzen</span></button></div>`:s!=='not-arrived'?`<div class="room-grid" style="grid-template-columns:1fr"><button class="room-btn checkout" onclick="markDone('${pid}')" style="flex-direction:row;gap:8px;justify-content:center"><span class="ri">${ico('checkCircle')}</span><span class="rn">Fertig — Auschecken</span></button></div>`:''}</div>`;
// TAB: BEHANDLUNGEN
h+=`<div class="sheet-tab-panel ${sheetActiveTab==='behandlungen'?'active':''}"><div style="padding:8px 20px">${buildBehandlungen(p)}</div></div>`;
// TAB: PATIENT (editable with save)
const mfaOpts=[...new Set(teamMembers.filter(m=>m.role==='mfa').map(m=>m.name))];
const arztOpts=[...new Set(teamMembers.filter(m=>m.role==='arzt').map(m=>m.name))];
const progOpts=['Core','Executive','Premium','Basic'];
const trackSelectHtml=`<div class="field-row"><div class="field-label">Track</div><div class="field-value"><select class="field-select" data-key="track" onchange="markFieldDirty(this,'${pid}')"><option value="">—</option>${tracks.map(t=>`<option value="${t.id}"${t.id===p.track?' selected':''}>${t.name}</option>`).join('')}</select></div></div>`;
// Build Soll vs Ist Startzeit display
const sollZeit=p.startzeit||'';
const istZeit=p.actualStart||'';
let zeitDisplay='';
if(sollZeit){
  const sollStr=fmtStartzeit(sollZeit);
  const istStr=istZeit?fmtStartzeit(istZeit):'—';

// 1) Kapazitätsprüfung
const cap=checkRoomCapacity(locId);if(cap.full){if(cap.hard){toast(`⛔ ${cap.name} ist belegt (max. ${cap.max}) — Zuweisung nicht möglich`);return false}const r=await showModal('Raum voll',`<p><strong>${cap.name}</strong> hat bereits ${cap.current} von ${cap.max} Patienten.</p><p>Trotzdem zuweisen?</p>`,[{label:'Abbrechen',cls:'modal-btn-cancel',val:'no'},{label:'Trotzdem zuweisen',cls:'modal-btn-confirm',val:'yes'}]);if(r!=='yes')return false}
// 2) Snapshot für Undo

if(opts.log)logActivity(`${p.vorname} ${p.nachname} → ${locName(locId)}`);
// 8) UI aktualisieren
renderAll();
// 9) Animation (identisch für alle Quellen)
animateTransition(locId);
// 10) Toast mit Undo
toast(`${p.vorname} → ${locName(locId)}`,()=>{p.journey.length=pJ;p.currentLocation=pL;p.locationSince=pS;p.status=pSt;saveData();if(opts.log)logActivity(`Rückgängig: ${p.vorname} ${p.nachname}`);renderAll()});
return true}

    const st=pStatus(p);
    const curLoc=ALL_LOCS.find(x=>x.id===p.currentLocation);
    const statusLabel=st==='not-arrived'?'Nicht da':st==='waiting'?'Wartend':curLoc?curLoc.name:'—';

    return`<button class="modal-btn" style="width:100%;text-align:left;padding:10px 14px;margin-bottom:4px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:8px" onclick="resolveModal('${p.id}')">${trkDot}<div style="flex:1"><div style="font-weight:600;font-size:14px">${p.vorname} ${p.nachname}</div><div style="font-size:11px;color:var(--text2)">#${p.pid} · ${p.suite}</div></div><span style="font-size:11px;font-weight:600;color:${statusColor};white-space:nowrap">${statusLabel}</span></button>`
  }).join('');
  const body=`<div style="max-height:50vh;overflow-y:auto;padding:4px 0">${listHtml}</div>`;
  const chosen=await showModal(`Patient → ${loc?loc.name:'Raum'}`,body,[{label:'Abbrechen',cls:'modal-btn-cancel',val:'no'}]);
  if(!chosen||chosen==='no')return;
  // Auto check-in if patient hasn't arrived yet
  const cp=patients.find(x=>x.id===chosen);
  if(cp&&pStatus(cp)==='not-arrived'){
    if(tracks.length>0&&!cp.track){
      const trackBtns=tracks.map(t=>`<button class="modal-btn modal-btn-confirm" style="border-left:4px solid ${t.color}" onclick="resolveModal('${t.id}')">${t.name}</button>`).join('');

let roomTouchTimer=null,roomTouchActive=false,roomTouchEl=null,roomTouchSrcId=null,roomTouchStartY=0;
function roomTouchStart(e,locId){
  const t=e.touches[0];roomTouchStartY=t.clientY;roomTouchActive=false;roomTouchSrcId=locId;
  if(roomTouchTimer)clearTimeout(roomTouchTimer);
  roomTouchTimer=setTimeout(()=>{
    roomTouchActive=true;if(navigator.vibrate)navigator.vibrate(30);
    const card=e.target.closest('.admin-card');if(card)card.style.opacity='0.4';
  },300)
}
function roomTouchMove(e){
  if(!roomTouchActive){const dy=Math.abs(e.touches[0].clientY-roomTouchStartY);if(dy>10&&roomTouchTimer){clearTimeout(roomTouchTimer);roomTouchTimer=null;roomTouchSrcId=null}return}
  e.preventDefault();
  document.querySelectorAll('.admin-card.room-drag-over').forEach(el=>el.classList.remove('room-drag-over'));
  const below=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  if(below){const c=below.closest('.admin-card[data-room-id]');if(c)c.classList.add('room-drag-over')}
}
function roomTouchEnd(e){
  if(roomTouchTimer){clearTimeout(roomTouchTimer);roomTouchTimer=null}
  document.querySelectorAll('.admin-card').forEach(el=>{el.style.opacity='';el.classList.remove('room-drag-over')});
  if(roomTouchActive&&roomTouchSrcId){
    const t=e.changedTouches[0];const below=document.elementFromPoint(t.clientX,t.clientY);
    if(below){const c=below.closest('.admin-card[data-room-id]');if(c){const tid=c.dataset.roomId;if(tid&&tid!==roomTouchSrcId){
      const src=ALL_LOCS.find(x=>x.id===roomTouchSrcId),tgt=ALL_LOCS.find(x=>x.id===tid);
      if(src&&tgt&&src.type===tgt.type){const arr=src.type==='suite'?SUITE_ROOMS:src.type==='room'?STATIONS:PAUSES;const si=arr.findIndex(x=>x.id===roomTouchSrcId),ti=arr.findIndex(x=>x.id===tid);if(si>=0&&ti>=0){arr.splice(si,1);arr.splice(ti,0,src);rebuildAllLocs();saveData();renderAdmin();renderDashboard();toast(`${src.name} verschoben`)}}
    }}}
  }
  roomTouchActive=false;roomTouchSrcId=null
}

async function removeTeamMember(id){const m=teamMembers.find(x=>x.id===id);if(!m)return;const r=await showModal('Mitglied entfernen?',`<p><strong>${m.name}</strong> (${m.email}) wirklich entfernen?</p><p style="font-size:12px;color:var(--text2)">Der Benutzer wird komplett gelöscht und kann sich nicht mehr anmelden.</p>`,[{label:'Abbrechen',cls:'modal-btn-cancel',val:'no'},{label:'Entfernen',cls:'modal-btn-danger',val:'yes'}]);if(r!=='yes')return;if(backendMode==='supabase'){
// Delete profile + auth user in one RPC call (SECURITY DEFINER bypasses RLS)
const{error:delErr}=await supaClient.rpc('delete_team_member',{p_user_id:id});
if(delErr){toast('Fehler beim Löschen: '+delErr.message);return}
// Reload team from DB — single source of truth
const{data:freshTeam}=await supaClient.from('profiles').select('*');
if(freshTeam){teamMembers=freshTeam.map(t=>({id:t.id,name:t.full_name||t.email,email:t.email,role:t.role||'mfa',status:t.status||'active'}))}
}else{teamMembers=teamMembers.filter(x=>x.id!==id)}
saveData();renderAdmin();toast(`${m.name} entfernt`)}
async function changePassword(){if(backendMode!=='supabase'){toast('Passwortänderung nur in Supabase-Modus verfügbar');return}
const pw=prompt('Neues Passwort:');if(!pw){return}
const pw2=prompt('Passwort bestätigen:');if(!pw2||pw!==pw2){toast('Passwörter stimmen nicht überein');return}
const{data,error}=await supaClient.auth.updateUser({password:pw});if(error){toast('Fehler: '+error.message);return}
toast('Passwort erfolgreich geändert')}
async function resetAllData(){const r=await showModal('Daten zurücksetzen?','<p>Alle Patienten-, Team- und Einstellungsdaten werden gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.</p>',[{label:'Abbrechen',cls:'modal-btn-cancel',val:'no'},{label:'Alles löschen',cls:'modal-btn-danger',val:'yes'}]);if(r==='yes'){localStorage.clear();location.reload()}}

function injectIcons(){const s=(id,n)=>{const el=document.getElementById(id);if(el)el.innerHTML=ICO[n]||''};s('hdrIcoCheckin','smartphone');s('hdrIcoAdmin','settings');s('navIcoCheckin','smartphone');s('navIcoPatients','list');s('navIcoDash','grid');s('navIcoAdmin','settings');s('heroIcoNfc','smartphone');s('scanSearchIco','search');s('patSearchIco','search')}

// INIT
// ═══════════════════════════════════════
(async function boot(){
  loadData();
  purgeNonAirtablePatients();
  migrateTxStatuses();
  const supaOk=await initSupabase();
  if(supaOk){
    await loadDataFromSupabase();
    purgeNonAirtablePatients();
    setupRealtimeSync();
    startConfigPolling();
  }
  // Airtable sync runs independently (works with and without Supabase)
  await fetchAirtablePatients();
  startAirtableSync();
  injectIcons();
  renderAll();
  checkURLForRoom();
  if(!supaOk)resetScanView();
})();
